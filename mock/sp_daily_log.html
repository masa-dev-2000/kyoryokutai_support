<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>日報入力 - 協力隊サポート</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { -webkit-tap-highlight-color: transparent; }
  .phone-frame { max-width: 390px; }
</style>
</head>
<body class="bg-slate-200 min-h-screen flex items-center justify-center p-4">
<div class="phone-frame w-full bg-white rounded-3xl shadow-2xl overflow-hidden" style="min-height: 844px;">

  <!-- Status bar -->
  <div class="bg-slate-50 px-6 py-2 flex justify-between text-xs text-slate-600">
    <span>9:41</span>
    <span>●●●●● 100%</span>
  </div>

  <!-- Header -->
  <header class="px-5 py-4 border-b border-slate-100 flex items-center justify-between">
    <div>
      <div class="text-xs text-slate-500">2026年4月18日 (金)</div>
      <h1 class="text-lg font-bold">今日の活動</h1>
    </div>
    <button class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center text-slate-600">≡</button>
  </header>

  <!-- Progress -->
  <div class="px-5 py-3 bg-emerald-50 border-b border-emerald-100 flex items-center gap-3">
    <div class="text-2xl">🔥</div>
    <div class="flex-1">
      <div class="text-sm font-semibold text-emerald-900">12日連続で記録中</div>
      <div class="text-xs text-emerald-700">今月は18/30日記録しました</div>
    </div>
  </div>

  <!-- Input area -->
  <main class="px-5 py-4 space-y-4">

    <div>
      <label class="text-xs font-semibold text-slate-500">活動メモ</label>
      <textarea class="mt-2 w-full h-40 p-3 border border-slate-200 rounded-xl text-sm resize-none focus:outline-none focus:border-emerald-500" placeholder="今日やったことを自由に...">午前: 篠山市の空き家バンク登録2件内覧同行
午後: 地元農家3軒と山の芋の販路について打合せ
夕方: 移住相談(大阪在住の30代夫婦) 1件 - 来月現地案内予定</textarea>
    </div>

    <!-- Voice input -->
    <button class="w-full py-3 border-2 border-dashed border-slate-300 rounded-xl flex items-center justify-center gap-2 text-slate-600 text-sm">
      <span class="text-xl">🎤</span>
      音声で入力(運転中・農作業中にも)
    </button>

    <!-- Photo attach -->
    <button class="w-full py-3 border-2 border-dashed border-slate-300 rounded-xl flex items-center justify-center gap-2 text-slate-600 text-sm">
      <span class="text-xl">📷</span>
      写真を添付
    </button>

    <!-- Tag suggestion -->
    <div>
      <label class="text-xs font-semibold text-slate-500">タグ(AI提案)</label>
      <div class="mt-2 flex flex-wrap gap-2">
        <span class="px-3 py-1.5 bg-emerald-100 text-emerald-800 rounded-full text-xs font-medium">✓ 移住促進</span>
        <span class="px-3 py-1.5 bg-emerald-100 text-emerald-800 rounded-full text-xs font-medium">✓ 空き家バンク</span>
        <span class="px-3 py-1.5 bg-emerald-100 text-emerald-800 rounded-full text-xs font-medium">✓ 農業</span>
        <span class="px-3 py-1.5 bg-slate-100 text-slate-600 rounded-full text-xs">+ 販路開拓</span>
        <span class="px-3 py-1.5 bg-slate-100 text-slate-600 rounded-full text-xs">+ 相談対応</span>
      </div>
    </div>

    <!-- Submit -->
    <button class="w-full py-4 bg-emerald-600 text-white font-bold rounded-xl shadow-lg shadow-emerald-600/30">
      保存する
    </button>

    <p class="text-center text-xs text-slate-400">保存内容は月次レポートに自動集約されます</p>

  </main>

  <!-- Bottom nav -->
  <nav class="border-t border-slate-100 bg-white grid grid-cols-3 text-center">
    <div class="py-3 text-emerald-600">
      <div class="text-xl">📝</div>
      <div class="text-xs font-semibold">日報</div>
    </div>
    <a href="./sp_monthly_report.html" class="py-3 text-slate-400">
      <div class="text-xl">📊</div>
      <div class="text-xs">レポート</div>
    </a>
    <div class="py-3 text-slate-400">
      <div class="text-xl">🔍</div>
      <div class="text-xs">他地域の事例</div>
    </div>
  </nav>
</div>

<a href="./index.html" class="fixed top-4 left-4 px-3 py-2 bg-white rounded-lg shadow text-xs">← モック一覧</a>
</body>
</html>
