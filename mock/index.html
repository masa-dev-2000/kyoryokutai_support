<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>協力隊サポート モック一覧</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen">
<div class="max-w-3xl mx-auto p-8">
  <h1 class="text-2xl font-bold mb-2">地域おこし協力隊サポート - ヒアリング用モック</h1>
  <p class="text-slate-600 mb-6">ヒアリングの「ソリューション反応」パートで提示する紙芝居です。遷移のみ動作。AI呼び出しなし。</p>
  <div class="grid gap-4 md:grid-cols-3">
    <a href="./sp_daily_log.html" class="block p-6 bg-white rounded-xl shadow hover:shadow-lg transition">
      <div class="text-xs text-slate-500 mb-2">スマホ / 隊員</div>
      <div class="font-bold text-lg mb-1">① 日報入力</div>
      <div class="text-sm text-slate-600">現場からその場で記録</div>
    </a>
    <a href="./sp_monthly_report.html" class="block p-6 bg-white rounded-xl shadow hover:shadow-lg transition">
      <div class="text-xs text-slate-500 mb-2">スマホ / 隊員</div>
      <div class="font-bold text-lg mb-1">② 月次レポート確認</div>
      <div class="text-sm text-slate-600">AIが日報から自動生成</div>
    </a>
    <a href="./pc_admin_dashboard.html" class="block p-6 bg-white rounded-xl shadow hover:shadow-lg transition">
      <div class="text-xs text-slate-500 mb-2">PC / 管理者</div>
      <div class="font-bold text-lg mb-1">③ 管理ダッシュボード</div>
      <div class="text-sm text-slate-600">自治体・県庁向け</div>
    </a>
  </div>
  <div class="mt-8 p-4 bg-amber-50 border border-amber-200 rounded-lg text-sm text-amber-900">
    <strong>ヒアリング時のメモ</strong>: 質問はdocs/01_hearing_plan.mdを参照。モックを見せた後、
    「これがあったら毎日続けられそうか」「続けられない理由があるとしたら何か」を必ず聞く。
  </div>
</div>
</body>
</html>
