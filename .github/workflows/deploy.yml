name: Deploy to GitHub Pages

# 注意(ADR-017): v5 にバックエンド(API Routes + SQLite)が入ったため、
# 静的エクスポート(output: export)は force-dynamic な /api/* と両立しません。
# フルスタックは Vercel / Node ホスト前提に変更しました。
# この Pages ワークフローは手動実行のみ残置(静的デモを作る場合は API を除いた
# 別ビルドが必要)。push では起動しません。
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (static export)
        run: npm run build
        env:
          NODE_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
